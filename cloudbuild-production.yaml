# Cloud Build configuration for Production Deployment
# This builds and deploys the Next.js application to Cloud Run

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  substitutionOption: 'ALLOW_LOOSE'

steps:
  # Step 1: Install dependencies
  - name: 'node:20-alpine'
    id: 'install-deps'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install -g pnpm@10.26.1
        pnpm install --frozen-lockfile

  # Step 2: Run database migrations
  - name: 'node:20-alpine'
    id: 'run-migrations'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install -g pnpm@10.26.1
        pnpm db:push
    secretEnv: ['DATABASE_URL']
    waitFor: ['install-deps']

  # Step 3: Build Next.js application
  - name: 'node:20-alpine'
    id: 'build-app'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install -g pnpm@10.26.1
        pnpm build
    env:
      - 'NODE_ENV=production'
    secretEnv:
      - 'DATABASE_URL'
      - 'GOOGLE_GENERATIVE_AI_API_KEY'
      - 'ASSEMBLYAI_API_KEY'
      - 'BETTER_AUTH_URL'
      - 'BETTER_AUTH_SECRET'
      - 'GOOGLE_CLIENT_ID'
      - 'GOOGLE_CLIENT_SECRET'
      - 'NEXT_PUBLIC_SANITY_PROJECT_ID'
      - 'NEXT_PUBLIC_SANITY_DATASET'
      - 'SANITY_API_READ_TOKEN'
    waitFor: ['run-migrations']

  # Step 4: Build Docker image for Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-production'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/pte/app:latest'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/pte/app:$SHORT_SHA'
      - '-f'
      - 'Dockerfile'
      - '.'
    waitFor: ['build-app']

  # Step 5: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-production'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/pte/app'
    waitFor: ['build-production']

  # Step 6: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'pte-academic'
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/pte/app:$SHORT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '1'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,GOOGLE_GENERATIVE_AI_API_KEY=GOOGLE_GENERATIVE_AI_API_KEY:latest,ASSEMBLYAI_API_KEY=ASSEMBLYAI_API_KEY:latest,BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,SANITY_API_READ_TOKEN=SANITY_API_READ_TOKEN:latest'
      - '--set-env-vars'
      - 'NODE_ENV=production,BETTER_AUTH_URL=$_BETTER_AUTH_URL,GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID,NEXT_PUBLIC_SANITY_PROJECT_ID=$_NEXT_PUBLIC_SANITY_PROJECT_ID,NEXT_PUBLIC_SANITY_DATASET=$_NEXT_PUBLIC_SANITY_DATASET'
    waitFor: ['push-production']

# Images to push
images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/pte/app:latest'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/pte/app:$SHORT_SHA'

# Secret Manager secrets
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_GENERATIVE_AI_API_KEY/versions/latest
      env: 'GOOGLE_GENERATIVE_AI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/ASSEMBLYAI_API_KEY/versions/latest
      env: 'ASSEMBLYAI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/BETTER_AUTH_URL/versions/latest
      env: 'BETTER_AUTH_URL'
    - versionName: projects/$PROJECT_ID/secrets/BETTER_AUTH_SECRET/versions/latest
      env: 'BETTER_AUTH_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_CLIENT_ID/versions/latest
      env: 'GOOGLE_CLIENT_ID'
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_CLIENT_SECRET/versions/latest
      env: 'GOOGLE_CLIENT_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SANITY_PROJECT_ID/versions/latest
      env: 'NEXT_PUBLIC_SANITY_PROJECT_ID'
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SANITY_DATASET/versions/latest
      env: 'NEXT_PUBLIC_SANITY_DATASET'
    - versionName: projects/$PROJECT_ID/secrets/SANITY_API_READ_TOKEN/versions/latest
      env: 'SANITY_API_READ_TOKEN'

# Substitutions
substitutions:
  _REGION: 'asia-south1'
  _BETTER_AUTH_URL: 'https://pte-academic-xxxxx.run.app'
  _GOOGLE_CLIENT_ID: 'your-client-id.apps.googleusercontent.com'
  _NEXT_PUBLIC_SANITY_PROJECT_ID: 'your-project-id'
  _NEXT_PUBLIC_SANITY_DATASET: 'production'

timeout: '3600s'
